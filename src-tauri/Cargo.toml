[package]
name = "tauri-app"
version = "0.1.0"
description = "A Tauri v1 + Go template targeting Windows 7 SP1 (POSReady 7)"
authors = ["NOGU-LAB"]
edition = "2021"

[build-dependencies]
tauri-build = { version = "1.5", features = [] }

[dependencies]
tauri = { version = "1.6", features = [
  "shell-sidecar",
  "shell-open",
  "path-all",
  "fs-create-dir",
] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[features]
default = ["custom-protocol"]
custom-protocol = ["tauri/custom-protocol"]
